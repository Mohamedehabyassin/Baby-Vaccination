name: baby_vaccination

description: A new Flutter application.

# The following line prevents the package from being accidentally published to
# pub.dev using `pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# In Android, build-name is used as versionName while build-number used as versionCode.
# Read more about Android versioning at https://developer.android.com/studio/publish/versioning
# In iOS, build-name is used as CFBundleShortVersionString while build-number used as CFBundleVersion.
# Read more about iOS versioning at
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.8
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.0

  dartz: ^0.10.1
  connectivity_plus: ^6.1.4

  flutter_svg: ^2.1.0
  cached_network_image: ^3.4.1

  flutter_secure_storage: ^9.2.4

  package_info_plus: ^8.3.0
  device_info_plus: ^11.5.0
  android_id: ^0.4.0

  flutter_bloc: ^9.1.0
  get_it: ^8.0.3
  injectable: ^2.7.1+4
  freezed_annotation: ^3.1.0
  json_annotation: ^4.11.0
  go_router: ^17.1.0


  smooth_page_indicator: ^1.1.0

  firebase_core: ^4.6.0
  firebase_auth: ^6.3.0
  google_sign_in: ^6.2.1
  path_provider: ^2.1.5
  open_file: ^3.3.2
  carousel_slider: ^5.1.1
  cloud_firestore: ^6.0.0
  flare_flutter: ^3.0.2
  flutter_screenutil: ^5.9.3
  flare_splash_screen: ^4.0.0
  firebase_messaging: ^16.0.0
  flutter_local_notifications: ^21.0.0
  google_maps_flutter: ^2.17.0
  google_maps_polyline: ^1.0.3
  flutter_polyline_points: ^3.1.0
  location: ^8.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.12
  injectable_generator: ^2.7.1+4
  freezed: ^3.2.5
  json_serializable: ^6.13.1



flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/flare/
    - assets/images/

  fonts:
    - family: Nunito
      fonts:
        - asset: assets/fonts/Nunito-Light.ttf
          weight: 300
        - asset: assets/fonts/Nunito-Regular.ttf
          weight: 400
        - asset: assets/fonts/Nunito-Medium.ttf
          weight: 500
        - asset: assets/fonts/Nunito-Bold.ttf
          weight: 700

    - family: Beiruti
      fonts:
        - asset: assets/fonts/Beiruti-Light.ttf
          weight: 300
        - asset: assets/fonts/Beiruti-Regular.ttf
          weight: 400
        - asset: assets/fonts/Beiruti-Medium.ttf
          weight: 500
        - asset: assets/fonts/Beiruti-Bold.ttf
          weight: 700

flutter_intl:
  enabled: true
  arb_dir: lib/core/presentation/localization
  output_dir: lib/core/presentation/localization
