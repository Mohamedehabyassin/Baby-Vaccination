# Flutter Analysis Options
# This file configures the analyzer to treat warnings as non-fatal for CI compatibility

include: package:flutter_lints/flutter.yaml

analyzer:
  # Exclude generated files and external packages
  exclude:
    - "**.g.dart"
    - "**.freezed.dart"
    - "**/generated_plugin_registrant.dart"
    - "build/**"
    - ".dart_tool/**"
    - "coverage/**"
    - "android/**"
    - "ios/**"
    - "web/**"
    - "macos/**"
    - "windows/**"
    - "linux/**"

  # Language settings
  language:
    strict-casts: false
    strict-inference: false
    strict-raw-types: false

  # Error configuration - keep real errors as errors, everything else as warnings
  errors:
    avoid_classes_with_only_static_members: ignore
    lines_longer_than_80_chars: ignore


    # Critical compilation errors (keep as errors)
    undefined_identifier: error
    undefined_method: error
    non_type_as_type_argument: error
    uri_does_not_exist: error
    avoid_field_initializers_in_const_classes: error
    avoid_init_to_null: error
    camel_case_types: error
    unused_import: error
    constant_identifier_names: error
    sized_box_shrink_expand: error
    avoid_renaming_method_parameters: error
    avoid_unused_constructor_parameters: error
    prefer_null_aware_operators: error





    # Everything else should be warnings to avoid failing CI
    avoid_unnecessary_containers: warning
    sort_constructors_first: warning
    always_declare_return_types: warning
    unnecessary_import: warning
    unused_element: warning
    unused_field: warning
    unused_local_variable: warning
    dead_code: warning
    dead_null_aware_expression: warning
    deprecated_member_use: warning
    deprecated_member_use_from_same_package: warning
    invalid_null_aware_operator: warning
    unnecessary_null_comparison: warning
    unnecessary_non_null_assertion: warning
    duplicate_import: warning
    undefined_hidden_name: warning
    avoid_print: warning
    avoid_redundant_argument_values: warning
    avoid_slow_async_io: error
    empty_catches: warning
    file_names: warning
    library_prefixes: warning
    no_leading_underscores_for_library_prefixes: error
    sized_box_for_whitespace: warning
    avoid_annotating_with_dynamic: warning


linter:
  rules:
    # Naming conventions
    - constant_identifier_names      # SCREAMING_SNAKE_CASE for constants
    - library_prefixes              # Use prefixes for imported libraries
    - camel_case_types
    - avoid_unnecessary_containers
    
    # Enable important rules for code quality
    - avoid_print
    - prefer_const_constructors
    - prefer_const_declarations
    - sort_unnamed_constructors_first
    - avoid_slow_async_io
    - avoid_renaming_method_parameters
    

    
    # Keep important analysis rules
    - avoid_empty_else
    - always_declare_return_types
    - annotate_overrides
    - prefer_is_empty
    - prefer_is_not_empty
    - use_key_in_widget_constructors
    - avoid_classes_with_only_static_members
    - avoid_annotating_with_dynamic
    - avoid_field_initializers_in_const_classes
    - avoid_init_to_null
    - avoid_redundant_argument_values
    - avoid_unused_constructor_parameters
    - empty_catches
    - file_names
    - lines_longer_than_80_chars
    - no_leading_underscores_for_library_prefixes
    - prefer_null_aware_operators
    - sized_box_for_whitespace
    - sized_box_shrink_expand
    - sort_constructors_first