<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>TinyShield - Settings</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Be_Vietnam_Pro:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-error": "#ffffff",
              "surface-container-high": "#e9e8e2",
              "surface-container-lowest": "#ffffff",
              "error-container": "#ffdad6",
              "on-tertiary": "#ffffff",
              "surface-container-highest": "#e3e3dc",
              "primary": "#476500",
              "error": "#ba1a1a",
              "outline": "#747967",
              "surface-bright": "#fafaf3",
              "on-surface-variant": "#444939",
              "surface-variant": "#e3e3dc",
              "on-primary-fixed": "#131f00",
              "on-secondary-container": "#6d5000",
              "on-primary-container": "#faffe7",
              "secondary-fixed": "#ffdfa0",
              "on-surface": "#1b1c18",
              "on-background": "#1b1c18",
              "on-secondary-fixed-variant": "#5c4300",
              "inverse-on-surface": "#f2f1ea",
              "primary-fixed": "#c8f17a",
              "on-error-container": "#93000a",
              "on-tertiary-fixed": "#380037",
              "on-tertiary-fixed-variant": "#73266f",
              "surface-tint": "#496800",
              "on-primary": "#ffffff",
              "outline-variant": "#c4c9b4",
              "surface-container-low": "#f5f4ed",
              "inverse-primary": "#add461",
              "secondary-container": "#ffbf00",
              "on-tertiary-container": "#fffbff",
              "on-secondary-fixed": "#261a00",
              "tertiary-fixed": "#ffd7f5",
              "surface": "#fafaf3",
              "tertiary": "#8c3d86",
              "primary-fixed-dim": "#add461",
              "on-secondary": "#ffffff",
              "inverse-surface": "#30312c",
              "background": "#fafaf3",
              "primary-container": "#5d7f13",
              "surface-dim": "#dbdad4",
              "on-primary-fixed-variant": "#364e00",
              "secondary": "#795900",
              "tertiary-fixed-dim": "#ffabf2",
              "secondary-fixed-dim": "#fbbc00",
              "surface-container": "#efeee7",
              "tertiary-container": "#a956a1"
            },
            fontFamily: {
              "headline": ["Plus Jakarta Sans"],
              "body": ["Be Vietnam Pro"],
              "label": ["Be Vietnam Pro"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body { font-family: 'Be Vietnam Pro', sans-serif; }
        h1, h2, h3 { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface min-h-screen pb-32">
<!-- TopAppBar -->
<header class="bg-[#fafaf3] dark:bg-[#1b1c18] flex justify-between items-center w-full px-6 py-4 fixed top-0 z-40">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-full overflow-hidden bg-surface-container-high ring-2 ring-primary/10">
<img class="w-full h-full object-cover" data-alt="Close up of a laughing infant in a soft cotton onesie with warm natural lighting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuC8qMTgsjvfSRvkE2VTz6uIIft3JJCSp0Q00YbEEa00DUSpBKrPRztvr5Pwp84glYCfxbunTbX5AO7tRFjN1VT6kXK_hV9j3h2OMQ-FCP01Go_Ta39Kgtgm9bxCYLau0JJzONN_EvT4KEriU9dX2xogyU-Y0NTXHq47Qxt1WEpWl49ULmCb9_RjWLx_pdaoeke_hKztBWsag-Vs_TB3SsMNcAUOTV1nZyNSYNcidYAqBlKTEIS9kfgGnhVvWyURkFR-MXqzpEPmjDQ"/>
</div>
<span class="text-[#476500] dark:text-[#b0d174] font-['Plus_Jakarta_Sans'] font-bold text-2xl tracking-tight">TinyShield</span>
</div>
<div class="flex items-center gap-2">
<button class="p-2 text-[#476500] dark:text-[#b0d174] hover:bg-[#f5f4ed] dark:hover:bg-[#2a2b24] rounded-full transition-colors active:scale-95 duration-200">
<span class="material-symbols-outlined" data-icon="notifications">notifications</span>
</button>
</div>
</header>
<main class="pt-24 px-6 max-w-2xl mx-auto space-y-10">
<!-- Profile Overview Section -->
<section class="space-y-6">
<h2 class="text-3xl font-extrabold tracking-tight text-on-surface">Settings</h2>
<div class="bg-surface-container-lowest p-6 rounded-[2rem] flex items-center justify-between shadow-[0_4px_24px_rgba(0,0,0,0.02)]">
<div class="flex items-center gap-4">
<div class="w-16 h-16 rounded-full bg-primary-container/20 flex items-center justify-center">
<span class="material-symbols-outlined text-primary text-3xl" data-icon="person">person</span>
</div>
<div>
<h3 class="font-bold text-lg leading-tight">Sarah Miller</h3>
<p class="text-on-surface-variant text-sm">Parent of Leo (6m)</p>
</div>
</div>
<button class="text-primary font-semibold text-sm px-4 py-2 hover:bg-primary/5 rounded-full transition-colors">Edit</button>
</div>
</section>
<!-- Language Toggle -->
<section class="space-y-4">
<h3 class="text-sm font-bold uppercase tracking-widest text-on-surface-variant/70 px-2">Language</h3>
<div class="bg-surface-container-low p-2 rounded-full flex gap-1">
<button class="flex-1 py-3 px-6 rounded-full bg-surface-container-lowest text-primary font-bold shadow-sm text-sm transition-all">English</button>
<button class="flex-1 py-3 px-6 rounded-full text-on-surface-variant font-medium text-sm transition-all hover:bg-surface-container-highest/50">العربية</button>
</div>
</section>
<!-- Notification Preferences -->
<section class="space-y-4">
<h3 class="text-sm font-bold uppercase tracking-widest text-on-surface-variant/70 px-2">Notifications</h3>
<div class="bg-surface-container-low rounded-[2rem] overflow-hidden">
<div class="flex items-center justify-between p-5 bg-surface-container-lowest mb-[1px]">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-on-surface-variant" data-icon="calendar_today">calendar_today</span>
<span class="font-medium">Reminders</span>
</div>
<label class="relative inline-flex items-center cursor-pointer">
<input checked="" class="sr-only peer" type="checkbox"/>
<div class="w-11 h-6 bg-surface-container-highest peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full rtl:peer-checked:after:-translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:start-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-primary"></div>
</label>
</div>
<div class="flex items-center justify-between p-5 bg-surface-container-lowest mb-[1px]">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-on-surface-variant" data-icon="emergency">emergency</span>
<span class="font-medium">Alerts</span>
</div>
<label class="relative inline-flex items-center cursor-pointer">
<input checked="" class="sr-only peer" type="checkbox"/>
<div class="w-11 h-6 bg-surface-container-highest peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full rtl:peer-checked:after:-translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:start-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-primary"></div>
</label>
</div>
<div class="flex items-center justify-between p-5 bg-surface-container-lowest">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-on-surface-variant" data-icon="medical_services">medical_services</span>
<span class="font-medium">Clinic updates</span>
</div>
<label class="relative inline-flex items-center cursor-pointer">
<input class="sr-only peer" type="checkbox"/>
<div class="w-11 h-6 bg-surface-container-highest peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full rtl:peer-checked:after:-translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:start-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-primary"></div>
</label>
</div>
</div>
</section>
<!-- System Settings -->
<section class="space-y-4">
<h3 class="text-sm font-bold uppercase tracking-widest text-on-surface-variant/70 px-2">App Settings</h3>
<div class="bg-surface-container-low rounded-[2rem] overflow-hidden">
<button class="w-full flex items-center justify-between p-5 bg-surface-container-lowest mb-[1px] hover:bg-surface-container-high transition-colors">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-on-surface-variant" data-icon="dark_mode">dark_mode</span>
<span class="font-medium">Theme</span>
</div>
<div class="flex items-center gap-2">
<span class="text-sm text-on-surface-variant">Light</span>
<span class="material-symbols-outlined text-on-surface-variant text-lg" data-icon="chevron_right">chevron_right</span>
</div>
</button>
<button class="w-full flex items-center justify-between p-5 bg-surface-container-lowest mb-[1px] hover:bg-surface-container-high transition-colors">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-on-surface-variant" data-icon="help">help</span>
<span class="font-medium">Support &amp; Help</span>
</div>
<span class="material-symbols-outlined text-on-surface-variant text-lg" data-icon="chevron_right">chevron_right</span>
</button>
<button class="w-full flex items-center justify-between p-5 bg-surface-container-lowest hover:bg-error/5 group transition-colors">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-error" data-icon="logout">logout</span>
<span class="font-medium text-error">Logout</span>
</div>
</button>
</div>
</section>
</main>
<!-- Success Toast Example -->
<div class="fixed bottom-32 left-1/2 -translate-x-1/2 w-[90%] max-w-sm z-50">
<div class="bg-secondary-container/80 backdrop-blur-xl p-4 rounded-2xl flex items-center gap-3 shadow-xl border border-white/20">
<div class="w-8 h-8 rounded-full bg-on-secondary-container flex items-center justify-center">
<span class="material-symbols-outlined text-secondary-container text-xl" data-icon="check" data-weight="fill" style="font-variation-settings: 'FILL' 1;">check</span>
</div>
<p class="text-on-secondary-container font-medium text-sm">Settings saved successfully!</p>
</div>
</div>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pb-6 pt-3 bg-[#fafaf3]/80 dark:bg-[#1b1c18]/80 backdrop-blur-xl border-t border-[#c4c9b4]/20 shadow-[0_-4px_24px_rgba(27,28,24,0.06)] rounded-t-[2rem]">
<a class="flex flex-col items-center justify-center text-[#444939] dark:text-[#c4c9b4] px-6 py-2 hover:opacity-80 transition-opacity active:scale-90 duration-200" href="#">
<span class="material-symbols-outlined" data-icon="home">home</span>
<span class="font-['Be_Vietnam_Pro'] text-xs font-medium">Home</span>
</a>
<a class="flex flex-col items-center justify-center text-[#444939] dark:text-[#c4c9b4] px-6 py-2 hover:opacity-80 transition-opacity active:scale-90 duration-200" href="#">
<span class="material-symbols-outlined" data-icon="event_upcoming">event_upcoming</span>
<span class="font-['Be_Vietnam_Pro'] text-xs font-medium">Timeline</span>
</a>
<a class="flex flex-col items-center justify-center bg-[#476500] text-white dark:bg-[#b0d174] dark:text-[#1b1c18] rounded-full px-6 py-2 transition-all active:scale-90 duration-200" href="#">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
<span class="font-['Be_Vietnam_Pro'] text-xs font-medium">Settings</span>
</a>
</nav>
</body></html>
